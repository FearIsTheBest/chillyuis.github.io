<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Browse Plugins - Chilly's Interfaces</title>
</head>
<body>
    <section class="help">
        <h1 class="fade-in">Browse Plugins</h1>
        <p class="fade-in fade-in-delay-1">Extend Chilly's Interfaces with community plugins.</p>

        <div class="features-grid fade-in fade-in-delay-2">
            <div class="feature-item plugin-item">
                <div class="plugin-head">
                    <h3>Cosmic API</h3>
                    <span class="plugin-badge">Executors</span>
                </div>
                <p>Windows Roblox executor backend. When enabled, the Attach button injects via Cosmic and scripts execute through it.</p>
                <div class="plugin-meta">v1.0.0 &middot; by Cosmic</div>
                <a class="modern-button plugin-download" href="plugins/cosmic-api.json" download="cosmic-api.json">Download</a>
            </div>
        </div>

        <div class="hero-buttons fade-in fade-in-delay-3">
            <button class="modern-button" onclick="window.location.href='index.html'">Back to Home</button>
            <button class="modern-button" onclick="window.location.href='https://discord.gg/9NPqhbEJk'">Discord</button>
        </div>
    </section>
</body>
</html>
